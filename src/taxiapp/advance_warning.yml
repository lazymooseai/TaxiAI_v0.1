name: TaksiAI — Ennakkovaroitusten tarkistus

on:
  schedule:
    - cron: "0 * * * *"   # joka tunti tasatunnein (UTC)
  workflow_dispatch:

jobs:
  advance-warning:
    name: Laske ennakkovaroitukset
    runs-on: ubuntu-latest
    timeout-minutes: 5
    env:
      SUPABASE_URL:      ${{ secrets.SUPABASE_URL }}
      SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
      - run: pip install supabase httpx
      - name: Laske ennakkovaroitukset
        run: |
          python -c "
          import asyncio, sys
          sys.path.insert(0, '.')
          from src.taxiapp.agents.preorder_tracker import AdvanceWarningEngine
          engine = AdvanceWarningEngine()
          async def run():
              w = await engine.calculate_advance_warnings()
              c1 = await engine.detect_area_clusters(1)
              c2 = await engine.detect_area_clusters(2)
              print(f'Varoituksia: {len(w)}, Klustereita: {len(c1)+len(c2)}')
              for x in w[:3]:
                  print(f'  +{x.hours_ahead}h {x.stand_name} {x.frequency_pct:.0f}%')
          asyncio.run(run())
          "
